<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">openpilot driver monitoring debugger</title>
  <desc id="description">A browser tool for replaying driver-camera video with synchronized driver monitoring telemetry.</desc>
  <rect width="1200" height="630" fill="#edf2f0"/>
  <rect x="44" y="44" width="1112" height="542" rx="28" fill="#101b1f"/>

  <rect x="80" y="82" width="276" height="44" rx="22" fill="#d9f2e9"/>
  <text x="108" y="111" fill="#173d3a" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="700">openpilot route utility</text>

  <text x="80" y="229" fill="#f5f7f6" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="68" font-weight="750">openpilot</text>
  <text x="80" y="306" fill="#f5f7f6" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="68" font-weight="750">driver monitoring</text>
  <text x="80" y="383" fill="#f5f7f6" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="68" font-weight="750">debugger</text>
  <text x="82" y="447" fill="#ced9d6" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="30">Replay the driver camera in your browser.</text>
  <text x="82" y="489" fill="#ced9d6" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28">Video, model state, and awareness in sync.</text>

  <rect x="80" y="530" width="330" height="48" rx="24" fill="#235348"/>
  <text x="108" y="562" fill="#9ce7ca" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="700">opdm.mindflakes.com</text>

  <rect x="682" y="130" width="438" height="370" rx="24" fill="#1b3032" stroke="#466b64" stroke-width="2"/>
  <text x="720" y="206" fill="#f5f7f6" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="700">Driver Monitoring</text>

  <text x="720" y="276" fill="#f5f7f6" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="700">Awareness</text>
  <text x="1034" y="276" fill="#9ce7ca" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="700" text-anchor="end">93%</text>
  <rect x="720" y="302" width="360" height="18" rx="9" fill="#284c46" stroke="#5e817a" stroke-width="2"/>
  <circle cx="1054" cy="311" r="15" fill="#94e2c3" stroke="#f5f7f6" stroke-width="4"/>
  <text x="720" y="351" fill="#91a39f" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="700">min</text>
  <text x="1080" y="351" fill="#91a39f" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="700" text-anchor="end">max</text>

  <text x="720" y="405" fill="#f5f7f6" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="700">Face probability</text>
  <text x="1034" y="405" fill="#9ce7ca" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="700" text-anchor="end">78%</text>
  <rect x="720" y="431" width="360" height="18" rx="9" fill="#284c46" stroke="#5e817a" stroke-width="2"/>
  <circle cx="1000" cy="440" r="15" fill="#94e2c3" stroke="#f5f7f6" stroke-width="4"/>
  <text x="720" y="480" fill="#91a39f" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="700">min</text>
  <text x="1080" y="480" fill="#91a39f" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="700" text-anchor="end">max</text>
</svg>
