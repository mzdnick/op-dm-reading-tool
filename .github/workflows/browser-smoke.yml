name: Native HEVC browser smoke

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "23 11 * * 2"

permissions:
  contents: read

jobs:
  hevc:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install --global pnpm@11.12.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:smoke
        env:
          COMMA_TEST_ROUTE: ${{ secrets.COMMA_TEST_ROUTE }}
          COMMA_JWT: ${{ secrets.COMMA_JWT }}
      - run: pnpm test:browser
        env:
          COMMA_TEST_ROUTE: ${{ secrets.COMMA_TEST_ROUTE }}
          COMMA_JWT: ${{ secrets.COMMA_JWT }}
